<!doctype html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Birthday Surprise 🎂</title>

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family: Arial, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      overflow:hidden;
      background: linear-gradient(135deg,#6f4e37,#a67b5b);
      position:relative;
    }

    .container{
      text-align:center;
      background:#f5ebe0;
      padding:40px;
      border-radius:25px;
      width:90%;
      max-width:500px;
      box-shadow:0 10px 30px rgba(0,0,0,0.25);
      animation:muncul 1s ease;
      position:relative;
      z-index:2;
    }

    h1{
      color:#5c4033;
      margin-bottom:15px;
      font-size:35px;
    }

    p{
      color:#4b3832;
      font-size:18px;
      margin-bottom:25px;
      line-height:1.6;
    }

    .btn{
      padding:12px 25px;
      border:none;
      border-radius:12px;
      cursor:pointer;
      font-size:16px;
      margin:10px;
      transition:0.3s;
      font-weight:bold;
    }

    .yes{
      background:#6f4e37;
      color:white;
    }

    .yes:hover{
      transform:scale(1.08);
      background:#5c4033;
    }

    .no{
      background:#d6c2b0;
      color:#3e2723;
      position:absolute;
    }

    .foto{
      width:180px;
      height:180px;
      border-radius:20px;
      object-fit:cover;
      margin-bottom:20px;
      box-shadow:0 5px 15px rgba(0,0,0,0.2);
      animation:zoom 2s infinite alternate;
    }

    @keyframes zoom{
      from{
        transform:scale(1);
      }
      to{
        transform:scale(1.05);
      }
    }

    @keyframes muncul{
      from{
        opacity:0;
        transform:scale(0.5);
      }
      to{
        opacity:1;
        transform:scale(1);
      }
    }

    .confetti{
      position:absolute;
      width:10px;
      height:10px;
      top:-10px;
      animation:jatuh linear infinite;
      z-index:1;
    }

    @keyframes jatuh{
      to{
        transform:translateY(110vh) rotate(360deg);
      }
    }

  </style>
</head>

<body>

  <div class="container" id="box">

    <h1>Hai Kiyaa 🤎</h1>

    <p>
      Aku punya sesuatu buat kamu 😊<br>
      Mau lanjut ga?
    </p>

    <button class="btn yes" onclick="lanjut()">
      Lanjut ✨
    </button>

    <button class="btn no" id="noBtn">
      Enggak 😜
    </button>

  </div>

  <script>

    const noBtn = document.getElementById("noBtn");

    // Tombol enggak kabur
    noBtn.addEventListener("mouseover", () => {

      const x = Math.random() * (window.innerWidth - 120);
      const y = Math.random() * (window.innerHeight - 80);

      noBtn.style.left = x + "px";
      noBtn.style.top = y + "px";
    });

    function lanjut(){

      document.getElementById("box").innerHTML = `

        <img 
          src="https://images.unsplash.com/photo-1517841905240-472988babdf9?q=80&w=800&auto=format&fit=crop"
          class="foto"
        >

        <h1>🎂 Happy Birthday, Kiyaa 🤎</h1>

        <p>
          Selamat ulang tahun yaa Kiyaa 🥳<br><br>

          Semoga di umur yang baru ini
          semua hal baik selalu datang ke kamu,
          sehat selalu, panjang umur,
          makin bahagia, dan semua impianmu
          bisa tercapai satu per satu 🌷<br><br>

          Jangan lupa selalu jadi Kiyaa
          yang ceria dan spesial yaa 😊🤎
        </p>

        <button class="btn yes"
        onclick="alert('Semoga harimu menyenangkan Kiyaa 🤎')">

          Klik Lagi 🎁

        </button>
      `;

      confetti();
    }

    // Efek confetti
    function confetti(){

      for(let i = 0; i < 100; i++){

        let conf = document.createElement("div");

        conf.classList.add("confetti");

        conf.style.left =
          Math.random() * 100 + "vw";

        conf.style.background =
          `hsl(${Math.random()*40 + 20},70%,60%)`;

        conf.style.animationDuration =
          (Math.random()*3 + 2) + "s";

        conf.style.width =
        conf.style.height =
          (Math.random()*8 + 5) + "px";

        document.body.appendChild(conf);
      }
    }

  </script>

</body>
</html>
